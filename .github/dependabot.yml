# Grouped weekly dependency updates with a 14-day cooldown, so updates arrive as a
# few consolidated PRs instead of a stream of singletons.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      docker-images:
        patterns:
          - '*'

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      compose-images:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      actions:
        patterns:
          - '*'
