name: Release

# Release engineering per docs/spec/11-release-engineering.md:
#  - every push to main runs release-please (REL-002)
#  - while a release PR is open, publish an RC prerelease with artifacts (REL-003)
#  - when the release PR merges and the release is created, attach final artifacts (REL-004)
#  - RC and final builds also push the image to GHCR so docker-compose.release.yml
#    can run the stack pull-only, no checkout or local build (REL-007/REL-008)
#
# RC tag invariant (REL-003): RC prereleases are published under opaque git tags
# (`rc-<run_number>`) that release-please cannot parse as release versions — the
# human-readable `v<next>-rc.<run>` appears only in the release title, artifact
# filenames, and GHCR image tags (REL-007; container tags don't feed release-please).
# Final releases are the only SemVer tags in the repo; `rc-*` prereleases (and their
# tags) are pruned when a final release publishes.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      prs: ${{ steps.rp.outputs.prs }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      # One-time recovery + standing guard (REL-003, android issue #69): earlier RC
      # automation tagged prereleases with SemVer tags (v1.0.0-rc.1, v1.1.0-rc.2,
      # v1.2.0-rc.4), which release-please parses as shipped versions and ratchets the
      # pending release version past them. Delete any such release (and its tag, via
      # --cleanup-tag) BEFORE release-please runs so its version stream only ever sees
      # final release tags. No checkout exists in this job — gh works repo-less with
      # GH_REPO set. Remove this step if release-please is ever configured to manage
      # real SemVer prerelease tags itself.
      - name: Delete legacy SemVer-tagged RC releases
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release list --limit 100 --json tagName \
            --jq '.[].tagName | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+-rc\\.[0-9]+$"))' \
            | while read -r tag; do
                echo "Deleting legacy SemVer RC release + tag: $tag"
                gh release delete "$tag" --cleanup-tag --yes
              done
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          release-type: node

  build:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.pr }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
      - name: Determine version
        id: version
        # `version` is the human-readable name used in release titles, artifact
        # filenames, and GHCR image tags (REL-007); `tag` is the git tag. For finals
        # they coincide (SemVer, release-please's own tag); for RCs the tag is the
        # opaque `rc-<run_number>` (REL-003).
        run: |
          if [ "${{ needs.release-please.outputs.release_created }}" = "true" ]; then
            echo "kind=final" >> "$GITHUB_OUTPUT"
            echo "version=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            NEXT=$(echo '${{ needs.release-please.outputs.pr }}' | jq -r '.title' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            echo "kind=rc" >> "$GITHUB_OUTPUT"
            echo "version=v${NEXT}-rc.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "tag=rc-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build Docker image
        run: docker build -t roadtrip-backend:${{ steps.version.outputs.version }} .
      - name: Export artifacts
        run: |
          docker save roadtrip-backend:${{ steps.version.outputs.version }} | gzip > roadtrip-backend-image-${{ steps.version.outputs.version }}.tar.gz
          cp docs/spec/openapi.yaml openapi-${{ steps.version.outputs.version }}.yaml
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image to GHCR (REL-007)
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker tag roadtrip-backend:${{ steps.version.outputs.version }} "$IMAGE:${{ steps.version.outputs.version }}"
          docker push "$IMAGE:${{ steps.version.outputs.version }}"
          if [ "${{ steps.version.outputs.kind }}" = "final" ]; then
            docker tag roadtrip-backend:${{ steps.version.outputs.version }} "$IMAGE:latest"
            docker push "$IMAGE:latest"
          fi
      - name: Publish release candidate (prerelease)
        if: steps.version.outputs.kind == 'rc'
        # Workflow re-runs reuse the run number, so delete any previous attempt first —
        # with --cleanup-tag, since a bare `gh release delete` leaks the git tag.
        run: |
          gh release delete "${{ steps.version.outputs.tag }}" --cleanup-tag --yes 2>/dev/null || true
          gh release create "${{ steps.version.outputs.tag }}" \
            --prerelease \
            --target "${{ github.sha }}" \
            --title "Release candidate ${{ steps.version.outputs.version }}" \
            --notes "Automated release candidate built from \`main\` @ ${{ github.sha }} while the release PR is open. Image: \`ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}\`" \
            roadtrip-backend-image-${{ steps.version.outputs.version }}.tar.gz \
            openapi-${{ steps.version.outputs.version }}.yaml \
            docker-compose.yml \
            docker-compose.release.yml
      - name: Attach final artifacts to release notes
        if: steps.version.outputs.kind == 'final'
        run: |
          gh release upload "${{ steps.version.outputs.version }}" \
            roadtrip-backend-image-${{ steps.version.outputs.version }}.tar.gz \
            openapi-${{ steps.version.outputs.version }}.yaml \
            docker-compose.yml \
            docker-compose.release.yml
      - name: Prune release-candidate prereleases
        if: steps.version.outputs.kind == 'final'
        # The final release supersedes all its RCs: delete `rc-*` prereleases and their
        # tags so only final (SemVer-tagged) releases accumulate (REL-003).
        run: |
          gh release list --limit 100 --json tagName \
            --jq '.[].tagName | select(test("^rc-[0-9]+$"))' \
            | while read -r tag; do
                echo "Pruning RC prerelease + tag: $tag"
                gh release delete "$tag" --cleanup-tag --yes
              done
